<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuisFit | Registro Completo Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
        }
        .input-field {
            width: 100%;
            background-color: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            font-weight: 600;
            color: #1e293b;
            outline: none;
            transition: all 0.2s;
        }
        .input-field:focus {
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        /* Estilo para que el placeholder se vea como el valor anterior sombreado */
        .input-field::placeholder {
            color: #94a3b8;
            opacity: 0.7;
            font-weight: 500;
        }
        .label-text {
            font-size: 0.65rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
            margin-left: 0.25rem;
            display: block;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5 17.5 17.5"/><path d="M21 21-1-1"/><path d="M3 3 1 1"/><path d="M18 22 4-4"/><path d="M2 6 4-4"/><path d="M3 10 7-7"/><path d="M14 21 7-7"/></svg>
                </div>
                <span class="font-extrabold text-slate-900 tracking-tighter text-lg">LUISFIT <span class="text-blue-600">PRO</span></span>
            </div>
            
            <div class="flex gap-2">
                <button onclick="exportData()" class="p-2 text-slate-500 hover:bg-slate-100 rounded-lg transition-all" title="Exportar Backup">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                </button>
                <button onclick="document.getElementById('fileInput').click()" class="p-2 text-slate-500 hover:bg-slate-100 rounded-lg transition-all" title="Importar Backup">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                </button>
                <input type="file" id="fileInput" class="hidden" accept=".json" onchange="importData(event)">
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pt-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Formulario Lateral -->
        <div class="lg:col-span-4">
            <div class="glass-card rounded-3xl p-6 shadow-sm sticky top-20">
                <h2 class="text-sm font-extrabold text-slate-900 uppercase tracking-widest mb-6 flex items-center gap-2">
                    <span class="w-1.5 h-4 bg-blue-600 rounded-full"></span> Nuevo Registro
                </h2>
                
                <form id="fitForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="col-span-2">
                            <label class="label-text">Fecha</label>
                            <input type="date" id="fecha" required class="input-field">
                        </div>
                        <div>
                            <label class="label-text">Peso (kg)</label>
                            <input type="number" step="0.1" id="peso" required class="input-field" placeholder="--">
                        </div>
                        <div>
                            <label class="label-text">Estatura (cm)</label>
                            <input type="number" id="estatura" value="178" required class="input-field">
                        </div>
                        <div>
                            <label class="label-text">Cuello (cm)</label>
                            <input type="number" step="0.1" id="cuello" required class="input-field" placeholder="--">
                        </div>
                        <div>
                            <label class="label-text">Cintura (cm)</label>
                            <input type="number" step="0.1" id="cintura" required class="input-field" placeholder="--">
                        </div>
                        <div>
                            <label class="label-text">Abdomen (cm)</label>
                            <input type="number" step="0.1" id="abdomen" class="input-field" placeholder="--">
                        </div>
                        <div>
                            <label class="label-text">Pecho (cm)</label>
                            <input type="number" step="0.1" id="pecho" class="input-field" placeholder="--">
                        </div>
                        <div>
                            <label class="label-text">Bíceps (cm)</label>
                            <input type="number" step="0.1" id="biceps" class="input-field" placeholder="--">
                        </div>
                        <div>
                            <label class="label-text">Muslo (cm)</label>
                            <input type="number" step="0.1" id="muslo" class="input-field" placeholder="--">
                        </div>
                        <div>
                            <label class="label-text">Glúteo (cm)</label>
                            <input type="number" step="0.1" id="gluteo" class="input-field" placeholder="--">
                        </div>
                        <div>
                            <label class="label-text">Pantorrilla (cm)</label>
                            <input type="number" step="0.1" id="pantorrilla" class="input-field" placeholder="--">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-sm uppercase tracking-widest hover:bg-blue-600 shadow-lg shadow-slate-200 transition-all active:scale-95 mt-4">
                        Guardar Medidas
                    </button>
                </form>
            </div>
        </div>

        <!-- Contenido Principal -->
        <div class="lg:col-span-8 space-y-6">
            
            <!-- Cards de Resumen -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="glass-card p-6 rounded-3xl shadow-sm border-b-4 border-b-blue-500">
                    <p class="label-text">Peso Actual</p>
                    <div class="flex items-baseline gap-1">
                        <span id="stat-peso" class="text-3xl font-extrabold text-slate-900">--</span>
                        <span class="text-xs font-bold text-slate-400">kg</span>
                    </div>
                </div>
                <div class="glass-card p-6 rounded-3xl shadow-sm border-b-4 border-b-emerald-500">
                    <p class="label-text">Grasa Corporal</p>
                    <div class="flex items-baseline gap-1">
                        <span id="stat-grasa" class="text-3xl font-extrabold text-slate-900">--</span>
                        <span class="text-xs font-bold text-slate-400">%</span>
                    </div>
                </div>
                <div class="glass-card p-6 rounded-3xl shadow-sm border-b-4 border-b-indigo-500">
                    <p class="label-text">IMC</p>
                    <div class="flex items-baseline gap-1">
                        <span id="stat-imc" class="text-3xl font-extrabold text-slate-900">--</span>
                    </div>
                </div>
            </div>

            <!-- Gráfico de Progreso -->
            <div class="glass-card p-6 rounded-3xl shadow-sm">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="label-text !mb-0">Histórico de Peso</h3>
                    <div class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase">Últimos registros</div>
                </div>
                <div class="h-[280px]">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>

            <!-- Tabla de Historial -->
            <div class="glass-card rounded-3xl overflow-hidden shadow-sm">
                <div class="p-5 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                    <h3 class="label-text !mb-0">Historial de Medidas</h3>
                    <span id="totalRecords" class="text-[10px] font-bold text-slate-400">0 Registros</span>
                </div>
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-left text-sm border-collapse">
                        <thead>
                            <tr class="bg-slate-50">
                                <th class="px-6 py-4 label-text">Fecha</th>
                                <th class="px-4 py-4 label-text text-center">Peso</th>
                                <th class="px-4 py-4 label-text text-center">Grasa</th>
                                <th class="px-4 py-4 label-text text-center">Cintura</th>
                                <th class="px-4 py-4 label-text text-center">Pantorrilla</th>
                                <th class="px-6 py-4 label-text text-right">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="dataTable" class="font-semibold text-slate-700 divide-y divide-slate-100">
                            <!-- JS inyecta aquí -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- DATA MANAGEMENT ---
        let records = JSON.parse(localStorage.getItem('luisfit_v3_local')) || [];
        let myChart = null;

        // --- INIT ---
        window.onload = () => {
            document.getElementById('fecha').valueAsDate = new Date();
            refreshUI();
            updatePlaceholders();
        };

        // --- LOGIC ---
        const fitForm = document.getElementById('fitForm');
        
        fitForm.onsubmit = (e) => {
            e.preventDefault();
            
            const p = parseFloat(document.getElementById('peso').value);
            const h = parseFloat(document.getElementById('estatura').value);
            const c = parseFloat(document.getElementById('cintura').value);
            const n = parseFloat(document.getElementById('cuello').value);
            const f = document.getElementById('fecha').value;

            // Cálculos
            const imc = (p / ((h / 100) ** 2)).toFixed(1);
            let grasa = (495 / (1.0324 - 0.19077 * Math.log10(c - n) + 0.15456 * Math.log10(h)) - 450).toFixed(1);
            if (isNaN(grasa) || grasa < 0) grasa = 0;

            const newRecord = {
                fecha: f,
                peso: p,
                estatura: h,
                cuello: n,
                cintura: c,
                abdomen: parseFloat(document.getElementById('abdomen').value) || 0,
                pecho: parseFloat(document.getElementById('pecho').value) || 0,
                biceps: parseFloat(document.getElementById('biceps').value) || 0,
                muslo: parseFloat(document.getElementById('muslo').value) || 0,
                gluteo: parseFloat(document.getElementById('gluteo').value) || 0,
                pantorrilla: parseFloat(document.getElementById('pantorrilla').value) || 0,
                imc: imc,
                grasa: grasa
            };

            // Actualizar si la fecha ya existe, sino añadir
            const existingIndex = records.findIndex(r => r.fecha === f);
            if (existingIndex !== -1) {
                records[existingIndex] = newRecord;
            } else {
                records.push(newRecord);
            }

            saveData();
            refreshUI();
            fitForm.reset();
            document.getElementById('fecha').valueAsDate = new Date();
            document.getElementById('estatura').value = 178;
            updatePlaceholders(); 
        };

        function saveData() {
            records.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
            localStorage.setItem('luisfit_v3_local', JSON.stringify(records));
        }

        function updatePlaceholders() {
            if (records.length === 0) return;
            const last = records[records.length - 1];
            
            const fields = ['peso', 'cuello', 'cintura', 'abdomen', 'pecho', 'biceps', 'muslo', 'gluteo', 'pantorrilla'];
            fields.forEach(field => {
                if (last[field] !== undefined && last[field] !== null) {
                    document.getElementById(field).placeholder = last[field];
                }
            });
            if (last.estatura) document.getElementById('estatura').value = last.estatura;
        }

        function refreshUI() {
            renderStats();
            renderTable();
            renderChart();
            document.getElementById('totalRecords').innerText = `${records.length} Registros`;
        }

        function renderStats() {
            if (records.length === 0) return;
            const last = records[records.length - 1];
            document.getElementById('stat-peso').innerText = last.peso;
            document.getElementById('stat-grasa').innerText = last.grasa;
            document.getElementById('stat-imc').innerText = last.imc;
        }

        function renderTable() {
            const table = document.getElementById('dataTable');
            table.innerHTML = '';

            if (records.length === 0) {
                table.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-slate-400 italic">No hay datos todavía.</td></tr>`;
                return;
            }

            [...records].reverse().forEach((r, idx) => {
                const realIndex = records.length - 1 - idx;
                const row = `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4 text-xs font-bold text-slate-400">${formatearFecha(r.fecha)}</td>
                        <td class="px-4 py-4 text-center">${r.peso}</td>
                        <td class="px-4 py-4 text-center text-blue-600">${r.grasa}%</td>
                        <td class="px-4 py-4 text-center">${r.cintura}</td>
                        <td class="px-4 py-4 text-center">${r.pantorrilla || '--'}</td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="deleteRecord(${realIndex})" class="p-2 text-slate-300 hover:text-red-500 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                            </button>
                        </td>
                    </tr>
                `;
                table.innerHTML += row;
            });
        }

        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (myChart) myChart.destroy();

            const labels = records.map(r => formatearFecha(r.fecha));
            const dataPeso = records.map(r => r.peso);

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Peso',
                        data: dataPeso,
                        borderColor: '#2563eb',
                        borderWidth: 3,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#2563eb',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        tension: 0.35,
                        fill: true,
                        backgroundColor: (context) => {
                            const gradient = context.chart.ctx.createLinearGradient(0, 0, 0, 300);
                            gradient.addColorStop(0, 'rgba(37, 99, 235, 0.1)');
                            gradient.addColorStop(1, 'rgba(37, 99, 235, 0)');
                            return gradient;
                        }
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            beginAtZero: false,
                            grid: { color: '#f1f5f9' },
                            ticks: { font: { size: 10, weight: 'bold' }, color: '#94a3b8' }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { font: { size: 10, weight: 'bold' }, color: '#94a3b8' }
                        }
                    }
                }
            });
        }

        function deleteRecord(index) {
            if (confirm('¿Seguro que quieres borrar este registro?')) {
                records.splice(index, 1);
                saveData();
                refreshUI();
                updatePlaceholders();
            }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `LuisFit_Backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function importData(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    if (confirm(`Se han detectado ${data.length} registros. ¿Importar y sobrescribir actuales?`)) {
                        records = data;
                        saveData();
                        refreshUI();
                        updatePlaceholders();
                    }
                } catch (err) {
                    alert('Archivo no válido.');
                }
            };
            reader.readAsText(file);
        }

        function formatearFecha(f) {
            const date = new Date(f + "T00:00:00");
            return date.toLocaleDateString('es-ES', { day: '2-digit', month: 'short' });
        }
    </script>
</body>
</html>
