<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuisFit | Cloud System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Firebase SDK Moderno -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // CONFIGURACIÓN DE SEGURIDAD
        let config;
        try {
            config = JSON.parse(__firebase_config);
        } catch (e) {
            console.error("Error al cargar configuración", e);
            document.body.innerHTML = "<div class='p-10 text-center font-bold'>Error: Configuración de Firebase no encontrada.</div>";
        }

        const app = initializeApp(config);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'luisfit-default';

        // Elementos UI
        const statusIndicator = document.getElementById('statusIndicator');
        const saveButton = document.getElementById('saveButton');
        const historyTable = document.getElementById('historyTable');
        const logCount = document.getElementById('logCount');
        let myChart;

        // 1. Autenticación Anónima
        const startApp = async () => {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        updateStatus(true);
                        listenToData();
                    }
                });
            } catch (error) {
                console.error("Auth error", error);
                updateStatus(false);
            }
        };

        const updateStatus = (online) => {
            if (online) {
                statusIndicator.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500 shadow-lg"></span> NUBE ACTIVA`;
                statusIndicator.className = "flex items-center gap-2 px-4 py-2 rounded-full bg-emerald-50 text-[10px] font-black text-emerald-600 uppercase";
                saveButton.disabled = false;
                saveButton.innerText = "Guardar Registro";
            } else {
                statusIndicator.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span> ERROR DE CONEXIÓN`;
                statusIndicator.className = "flex items-center gap-2 px-4 py-2 rounded-full bg-red-50 text-[10px] font-black text-red-600 uppercase";
                saveButton.disabled = true;
            }
        };

        // 2. Escuchar Datos (Tiempo Real)
        const listenToData = () => {
            const dataPath = collection(db, 'artifacts', appId, 'public', 'data', 'measurements');
            // Nota: El ordenamiento se hace en memoria para evitar errores de índice de Firestore
            onSnapshot(dataPath, (snapshot) => {
                const logs = [];
                snapshot.forEach(doc => logs.push({ id: doc.id, ...doc.data() }));
                
                // Ordenar por fecha
                logs.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
                renderUI(logs);
            }, (error) => {
                console.error("Snapshot error", error);
                updateStatus(false);
            });
        };

        const renderUI = (data) => {
            historyTable.innerHTML = '';
            if (data.length === 0) {
                historyTable.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-400">Sin registros guardados</td></tr>';
                return;
            }

            logCount.innerText = data.length;
            const latest = data[data.length - 1];
            
            document.getElementById('statPeso').innerText = latest.peso + ' kg';
            document.getElementById('statGrasa').innerText = latest.grasa + '%';

            // Dibujar tabla (últimos arriba)
            [...data].reverse().forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-all group font-medium border-b border-slate-100";
                tr.innerHTML = `
                    <td class="px-6 py-4 text-slate-500 font-bold">${row.fecha}</td>
                    <td class="px-6 py-4 font-black text-slate-900">${row.peso}k</td>
                    <td class="px-6 py-4 text-blue-600 font-bold">${row.grasa}%</td>
                    <td class="px-6 py-4 text-slate-400">${row.cintura}cm</td>
                    <td class="px-6 py-4 text-right">
                        <button class="delete-btn opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 transition-all" data-id="${row.id}">
                            <svg class="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                    </td>
                `;
                historyTable.appendChild(tr);
            });

            // Gráfico
            updateChart(data.map(d => d.fecha), data.map(d => d.peso));
        };

        const updateChart = (labels, values) => {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        data: values,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.05)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 4,
                        pointRadius: 4,
                        pointBackgroundColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { border: { display: false } }, x: { grid: { display: false } } }
                }
            });
        };

        // 3. Guardar Datos
        document.getElementById('trackerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = saveButton;
            btn.disabled = true;
            btn.innerText = "Sincronizando...";

            const peso = parseFloat(document.getElementById('peso').value);
            const cintura = parseFloat(document.getElementById('cintura').value);
            const cuello = parseFloat(document.getElementById('cuello').value);
            const estatura = 178;

            const grasaCalc = (495 / (1.0324 - 0.19077 * Math.log10(cintura - cuello) + 0.15456 * Math.log10(estatura)) - 450).toFixed(1);

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'measurements'), {
                    fecha: document.getElementById('fecha').value,
                    peso, cintura, cuello,
                    grasa: grasaCalc,
                    timestamp: serverTimestamp()
                });
                e.target.reset();
                document.getElementById('fecha').valueAsDate = new Date();
                btn.innerText = "¡Guardado!";
                setTimeout(() => updateStatus(true), 1500);
            } catch (err) {
                console.error(err);
                alert("Error al guardar. Verifica las reglas de Firestore.");
                updateStatus(true);
            }
        });

        // Eventos delegados para borrar
        document.addEventListener('click', async (e) => {
            if (e.target.classList.contains('delete-btn')) {
                const id = e.target.dataset.id;
                if (confirm("¿Borrar este registro de la nube?")) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'measurements', id));
                }
            }
        });

        // Inicializar
        document.getElementById('fecha').valueAsDate = new Date();
        startApp();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; }
        .input-style { width: 100%; padding: 0.75rem; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 0.8rem; outline: none; transition: 0.2s; font-size: 14px; font-weight: 600; }
        .input-style:focus { border-color: #3b82f6; background: white; }
        .label-style { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 5px; display: block; letter-spacing: 0.05em; }
        .btn-main { background: #0f172a; color: white; padding: 1rem; border-radius: 1rem; font-weight: 700; width: 100%; transition: 0.3s; cursor: pointer; }
        .btn-main:hover:not(:disabled) { background: #3b82f6; transform: translateY(-2px); }
        .btn-main:disabled { background: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-b border-slate-200 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black">L</div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tighter uppercase leading-none">Luis<span class="text-blue-600">Fit</span></h1>
                    <span class="text-[9px] font-bold text-slate-400 tracking-widest uppercase">Cloud System v4.1</span>
                </div>
            </div>
            <div id="statusIndicator" class="flex items-center gap-2 px-4 py-2 rounded-full bg-slate-100 text-[10px] font-black text-slate-500">
                <span class="w-2 h-2 rounded-full bg-slate-400 animate-pulse"></span>
                CONECTANDO...
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 mt-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="glass-card p-6">
                <h2 class="text-lg font-bold mb-6 flex items-center gap-2">Registrar Progreso</h2>
                <form id="trackerForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="label-style">Fecha</label>
                            <input type="date" id="fecha" class="input-style" required>
                        </div>
                        <div>
                            <label class="label-style">Peso (Kg)</label>
                            <input type="number" step="0.1" id="peso" class="input-style" required>
                        </div>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-2xl grid grid-cols-2 gap-4">
                        <div>
                            <label class="label-style">Cintura (cm)</label>
                            <input type="number" step="0.1" id="cintura" class="input-style" value="108">
                        </div>
                        <div>
                            <label class="label-style">Cuello (cm)</label>
                            <input type="number" step="0.1" id="cuello" class="input-style" value="42">
                        </div>
                    </div>
                    <button type="submit" id="saveButton" class="btn-main" disabled>Sincronizando...</button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-card p-6">
                    <p class="label-style">Peso Actual</p>
                    <p id="statPeso" class="text-3xl font-black">--</p>
                </div>
                <div class="glass-card p-6">
                    <p class="label-style text-blue-600">% Grasa Est.</p>
                    <p id="statGrasa" class="text-3xl font-black text-blue-600">--</p>
                </div>
            </div>

            <div class="glass-card p-6">
                <div class="h-[300px]">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>

            <div class="glass-card overflow-hidden">
                <div class="px-6 py-4 bg-slate-50 border-b flex justify-between items-center">
                    <span class="text-xs font-black uppercase text-slate-500">Historial Cloud</span>
                    <span id="logCount" class="text-[10px] bg-white px-2 py-1 rounded-md border font-bold">0</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-[10px] font-black text-slate-400 uppercase border-b">
                            <tr>
                                <th class="px-6 py-4">Fecha</th>
                                <th class="px-6 py-4">Peso</th>
                                <th class="px-6 py-4">Grasa %</th>
                                <th class="px-6 py-4">Cintura</th>
                                <th class="px-6 py-4 text-right"></th>
                            </tr>
                        </thead>
                        <tbody id="historyTable" class="divide-y divide-slate-100 text-sm">
                            <tr><td colspan="5" class="p-8 text-center">Iniciando base de datos...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
